# Pings the free Render-hosted Cobalt grabber every ~10 min so it doesn't fall asleep
# (Render free web services sleep after ~15 min idle, and the first wake can outlast the
# import request's 9s timeout). Keeps "Add from link" snappy. Free: runs on GitHub Actions.
# GitHub disables scheduled workflows after 60 days of no repo activity — a push re-arms it.
name: Keep Cobalt awake

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may add some delay)
  workflow_dispatch: {}        # lets you run it by hand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the grabber so Render keeps it awake
        run: curl -sS -m 60 https://wesley-cobalt.onrender.com/ -o /dev/null || true
