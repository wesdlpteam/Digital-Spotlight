<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Space Spotlight Generator</title>

<!-- React + Babel (in-browser JSX, no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PowerPoint export -->
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<!-- QR codes (qrcode-generator: exposes a global `qrcode` with synchronous createDataURL) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<!-- PDF text extraction -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
  :root {
    --ink: #2b2536;
    --muted: #6b6478;
    --line: #e7e1ef;
    --bg: #f6f2fb;
    --panel: #ffffff;
    --accent: #7c4dff;        /* warm violet */
    --accent-2: #ff7043;      /* warm coral  */
    --accent-soft: #efe7ff;
    --good: #2e9e6b;
    --warn: #d9772e;
    --bad: #d64545;
    --radius: 14px;
    --shadow: 0 6px 24px rgba(60,40,90,.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, #f6f2fb 0%, #fdf3ef 100%);
    min-height: 100vh;
  }
  header.app {
    padding: 18px 26px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  header.app .logo {
    width: 40px; height: 40px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-size: 20px;
    box-shadow: var(--shadow);
  }
  header.app h1 { font-size: 19px; margin: 0; }
  header.app p { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 22px;
    padding: 22px 26px 60px;
    max-width: 1500px; margin: 0 auto;
  }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .panel.input { padding: 18px; align-self: start; position: sticky; top: 88px; }
  @media (max-width: 980px) { .panel.input { position: static; } }

  .group { margin-bottom: 16px; }
  .group > label.cap {
    display: block; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 6px;
  }
  input[type=text], input[type=password], textarea, select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; color: var(--ink); background: #fff; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea { resize: vertical; min-height: 88px; line-height: 1.45; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }

  .modes { display: flex; gap: 6px; background: var(--bg); padding: 5px; border-radius: 12px; }
  .modes button {
    flex: 1; padding: 9px 6px; border: 0; border-radius: 9px; background: transparent;
    font: inherit; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s;
  }
  .modes button.active { background: #fff; color: var(--accent); box-shadow: var(--shadow); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .filebox {
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 14px; text-align: center;
    background: var(--bg); cursor: pointer; transition: .15s;
  }
  .filebox:hover { border-color: var(--accent); background: var(--accent-soft); }
  .filebox .big { font-size: 26px; }
  .filebox .small { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .thumb { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 8px; box-shadow: var(--shadow); }

  .btn {
    width: 100%; padding: 12px; border: 0; border-radius: 12px; font: inherit; font-weight: 700;
    cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--shadow); }
  .btn.primary:hover { filter: brightness(1.04); }
  .btn.primary:disabled { opacity: .55; cursor: not-allowed; filter: none; }
  .btn.ghost { background: #fff; border: 1px solid var(--line); color: var(--ink); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn.ghost:disabled { opacity: .5; cursor: not-allowed; }

  .alert { padding: 11px 13px; border-radius: 11px; font-size: 13px; margin-top: 12px; line-height: 1.45; }
  .alert.bad { background: #fdecec; color: #9a2a2a; border: 1px solid #f3c9c9; }
  .alert.info { background: var(--accent-soft); color: #4a2db0; border: 1px solid #ddd0ff; }
  .alert pre { white-space: pre-wrap; word-break: break-word; margin: 6px 0 0; font-size: 11.5px; }

  /* Preview slides */
  .slides { display: flex; flex-direction: column; gap: 18px; }
  .slide {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .slide .bar { height: 6px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .slide .body { padding: 18px 20px; }
  .slide .kicker { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); font-weight: 800; }
  .slide h3 { margin: 4px 0 2px; font-size: 16px; }
  .editable {
    border: 1px solid transparent; border-radius: 8px; padding: 6px 8px; margin: -2px -8px 6px;
    width: calc(100% + 16px); font: inherit; color: var(--ink); background: transparent; display: block;
  }
  .editable:hover { background: #faf8ff; }
  .editable:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); outline: none; }
  textarea.editable { resize: vertical; line-height: 1.5; }
  .titlebig { font-size: 22px; font-weight: 800; }
  .meta-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
  .chip { background: var(--accent-soft); color: #4a2db0; padding: 4px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 600; }
  .chip.coral { background: #ffe6dc; color: #c5471f; }

  .step { display: grid; grid-template-columns: 56px 1fr auto; gap: 8px; align-items: start; margin-bottom: 8px; }
  .step .mins { display: flex; align-items: center; gap: 3px; }
  .step .mins input { width: 38px; text-align: center; padding: 6px 4px; }
  .step .mins span { font-size: 11px; color: var(--muted); }
  .step .name { font-weight: 700; }
  .iconbtn { border: 1px solid var(--line); background: #fff; border-radius: 8px; width: 28px; height: 28px; cursor: pointer; color: var(--muted); font-size: 14px; }
  .iconbtn:hover { border-color: var(--bad); color: var(--bad); }
  .addbtn { border: 1px dashed var(--line); background: #fff; border-radius: 9px; padding: 7px 10px; font: inherit; font-size: 12.5px; color: var(--accent); cursor: pointer; font-weight: 600; }
  .addbtn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .total { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .total.over { color: var(--bad); font-weight: 700; }

  .stim-link { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .stim-link img.qr { width: 120px; height: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fff; }
  .stim-link a { color: var(--accent); font-weight: 600; word-break: break-all; }
  .stim-img { text-align: center; }
  .stim-img img { max-width: 100%; max-height: 280px; border-radius: 10px; box-shadow: var(--shadow); }

  .ql { margin: 0; padding: 0; list-style: none; }
  .ql li { display: flex; gap: 8px; align-items: start; margin-bottom: 6px; }
  .ql li .num { background: var(--accent); color: #fff; min-width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center; font-size: 12px; font-weight: 700; margin-top: 4px; }
  .action-box { background: #fff7f3; border: 1px solid #ffd9c9; border-radius: 11px; padding: 10px 12px; margin-top: 10px; }
  .action-box .cap { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--accent-2); font-weight: 800; }
  .lp-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

  .empty { text-align: center; color: var(--muted); padding: 70px 30px; }
  .empty .big { font-size: 46px; margin-bottom: 10px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
  .toolbar .btn { width: auto; flex: 1; }

  .design-row { display: flex; gap: 14px; align-items: center; margin-bottom: 16px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 12px; box-shadow: var(--shadow); }
  .thumb-slide { width: 226px; height: 127px; flex: 0 0 auto; border-radius: 10px; padding: 12px; overflow: hidden; position: relative; box-shadow: var(--shadow); }
  .thumb-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; }
  .thumb-kick { font-size: 8px; letter-spacing: 1.5px; font-weight: 800; margin-top: 4px; }
  .thumb-title { font-size: 15px; font-weight: 800; line-height: 1.12; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .thumb-meta { font-size: 8px; position: absolute; bottom: 10px; left: 12px; right: 12px; }
  .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<!-- Force Babel to use the CLASSIC JSX runtime (React.createElement) instead of the
     automatic runtime, which would emit an `import` that breaks a non-module script. -->
<script>
  Babel.registerPreset("react-classic", {
    presets: [[Babel.availablePresets.react, { runtime: "classic" }]],
  });
</script>
<script type="text/babel" data-presets="react-classic">
const { useState, useRef, useMemo } = React;

/* ----------------------------- constants ----------------------------- */

const BANDS = {
  PYP: { label: "PYP (Prep–Year 6)", years: ["Prep","Year 1","Year 2","Year 3","Year 4","Year 5","Year 6"] },
  MYP: { label: "MYP (Years 7–10)", years: ["Year 7","Year 8","Year 9","Year 10"] },
  Senior: { label: "Senior (Years 11–12)", years: ["Year 11","Year 12"] },
};

const THEMES = [
  "Privacy","Kindness online","Misinformation","Digital footprint",
  "Screen balance","AI ethics","Online reputation",
];

const BAND_GUIDANCE = {
  PYP: "Audience: IB PYP (Prep–Year 6). Use concrete, simple, inquiry-based language. Short sentences, warm and curious. Centre noticing and wondering.",
  MYP: "Audience: IB MYP (Years 7–10). Use analytical language with real scenarios and consequences.",
  Senior: "Audience: IB Senior (Years 11–12). Use critical and ethical reasoning, nuance, and real-world stakes.",
};

// Authentic Harvard Project Zero thinking routines (pz.harvard.edu/thinking-routines),
// curated by band for a 5-minute discussion. The model picks ONE per Spotlight.
const ROUTINES = {
  PYP: [
    { name: "See–Think–Wonder", moves: "What do you see? What do you think about that? What does it make you wonder?" },
    { name: "Zoom In", moves: "Reveal only part: what do you notice and guess? Zoom out: what new things do you see, and how does your thinking change?" },
    { name: "Think–Puzzle–Explore", moves: "What do you think you know? What puzzles or questions do you have? How could we explore it?" },
    { name: "Color–Symbol–Image", moves: "Pick a colour, a symbol, and an image that capture the big idea." },
    { name: "I Used to Think… Now I Think…", moves: "How has your thinking changed? I used to think… now I think…" },
  ],
  MYP: [
    { name: "Connect–Extend–Challenge", moves: "How does this connect to what you knew? What extends your thinking? What's challenging or puzzling?" },
    { name: "3-2-1 Bridge", moves: "3 thoughts, 2 questions, 1 analogy beforehand; revisit afterward and bridge the change." },
    { name: "Think–Pair–Share", moves: "Think alone, pair to compare, then share with the group." },
    { name: "Claim–Support–Question", moves: "Make a claim, give supporting evidence, raise a question it leaves open." },
    { name: "Headlines", moves: "Write a headline that captures the core or heart of the issue right now." },
    { name: "What Makes You Say That?", moves: "What's going on here? What do you see that makes you say that?" },
  ],
  Senior: [
    { name: "Tug-of-War", moves: "Map the strongest pulls on each side of the dilemma, then weigh the competing 'tugs'." },
    { name: "Circle of Viewpoints", moves: "List the viewpoints, then choose one: I am thinking of… from the point of view of… I wonder…" },
    { name: "Take a Stand", moves: "Position yourself on a spectrum of opinion, justify with reasons, listen, and reconsider." },
    { name: "Claim–Support–Question", moves: "Make a claim, marshal evidence, then surface the question it leaves unresolved." },
    { name: "Step Inside", moves: "Inhabit a stakeholder's perspective: what do they perceive, feel, value, and risk?" },
  ],
};
const ROUTINE_SOURCE = "Harvard Project Zero Thinking Routines · pz.harvard.edu/thinking-routines";

const MODE_FRAMING = { image: "Look closely, then discuss.", article: "Read, then discuss.", video: "Watch, then discuss." };
const MODE_VERB = { image: "Look", article: "Read", video: "Watch" };

// PowerPoint / preview design themes. Hex values carry NO leading '#'.
const THEME_DESIGNS = {
  editorial: { label: "Bold Editorial", dark: true,  titleBg: "111317", contentBg: "1A1C22", ink: "FFFFFF", muted: "9AA3B2", accent: "19E6C1", accent2: "FF5C7A", titleFont: "Arial",        bodyFont: "Arial",    upper: true  },
  warm:      { label: "Warm Inquiry",  dark: false, titleBg: "F4EDFB", contentBg: "FFFFFF", ink: "2B2536", muted: "6B6478", accent: "7C4DFF", accent2: "FF7043", titleFont: "Calibri",      bodyFont: "Calibri",  upper: false },
  pop:       { label: "Playful Pop",   dark: false, titleBg: "FFF3D6", contentBg: "FFFFFF", ink: "23203A", muted: "6A6480", accent: "FF4D8D", accent2: "3DB9FF", titleFont: "Trebuchet MS", bodyFont: "Trebuchet MS", upper: false },
  academic:  { label: "Clean Academic",dark: false, titleBg: "FFFFFF", contentBg: "FFFFFF", ink: "1A2433", muted: "5A6473", accent: "12476B", accent2: "128C8C", titleFont: "Georgia",      bodyFont: "Georgia",  upper: false },
};
const hx = (c) => "#" + c;

/* ----------------------------- helpers ----------------------------- */

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Build a QR code data URL synchronously. Never throws — returns "" if the
// library is missing or generation fails, so a QR problem can't blank the app.
function makeQrDataUrl(text) {
  try {
    if (typeof qrcode !== "function" || !text) return "";
    const qr = qrcode(0, "M"); // type 0 = auto-size, medium error correction
    qr.addData(String(text));
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin -> GIF data URL
  } catch (_) {
    return "";
  }
}

// Strip site chrome (nav, images, link URLs, related-article footers) out of the
// markdown a reader service returns, leaving mostly the article body.
function cleanArticleMarkdown(md) {
  let t = String(md || "");
  // Cut everything from the first end-of-article / footer marker onward.
  const markers = ["Explore more on these topics", "\n### Most viewed", "\n## Most viewed", "\nReuse this content", "\n## More from"];
  let cut = t.length;
  for (const m of markers) { const i = t.indexOf(m); if (i !== -1 && i < cut) cut = i; }
  t = t.slice(0, cut);
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, "");          // drop images
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, "$1");        // links -> plain label
  t = t.replace(/^\s*-\s*\[[ xX]\]\s*$/gm, "");         // checkbox artefacts
  const drop = /^(Skip to|Search input|Show more|Hide expanded|Close dialogue|Support the Guardian|Fund independent|US edition|UK edition|Australia edition|Europe edition|International edition|Sign in|Print subscriptions|Download the app|View image|Prefer the Guardian|Toggle caption|Next image|Previous image|google-search)/i;
  t = t.split("\n").filter(l => !drop.test(l.trim())).join("\n");
  t = t.replace(/\n{3,}/g, "\n\n").trim();
  return t;
}

// Find the first real content image URL in reader markdown (skip logos/icons/sprites).
function extractLeadImage(md) {
  const re = /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/g;
  let m;
  while ((m = re.exec(String(md || "")))) {
    const u = m[1];
    if (/logo|icon|sprite|avatar|placeholder|1x1|pixel|\.svg(\?|$)/i.test(u)) continue;
    if (/\.(jpe?g|png|webp|gif)(\?|$)/i.test(u) || /\/img\/|\/media\/|\/images?\//i.test(u)) return u;
  }
  return "";
}

// Fetch a (possibly cross-origin) image and return a base64 data URL, routed through
// the wsrv.nl image proxy so CORS never blocks embedding it in the .pptx. "" on failure.
async function urlToDataUrl(url) {
  if (!url) return "";
  const proxied = "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/^https?:\/\//, "")) + "&output=jpg";
  try {
    const resp = await fetch(proxied);
    if (!resp.ok) throw new Error("proxy " + resp.status);
    const blob = await resp.blob();
    return await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
  } catch (_) { return ""; }
}

async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  const pdfjs = window.pdfjsLib;
  pdfjs.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

// Pull the first valid JSON object out of a string, defensively.
function parseJsonLoose(raw) {
  try { return JSON.parse(raw); } catch (_) {}
  const start = raw.indexOf("{");
  const end = raw.lastIndexOf("}");
  if (start !== -1 && end > start) {
    return JSON.parse(raw.slice(start, end + 1)); // may throw -> caller catches
  }
  throw new Error("No JSON object found in model output.");
}

/* --------------------------- OpenAI call --------------------------- */

async function generateSpotlight({ apiKey, model, mode, band, year, theme, title, imageDataUrl, sourceText }) {
  const yearStr = year ? ` Specifically pitch to ${year}.` : "";
  const titleInstruction = title
    ? `The teacher provided this title: "${title}". Use it (lightly polished if needed).`
    : `No title was provided — invent a short, inviting title (max ~8 words).`;

  const routineList = ROUTINES[band].map(r => `- ${r.name}: ${r.moves}`).join("\n");
  const summaryRule = mode === "image"
    ? `"summary": "" (empty string — the image is the stimulus, no summary needed),`
    : `"summary": "string — EXACTLY 5 sentences summarising the ${mode === "video" ? "video" : "article"} for students, pitched to the band",`;

  const schema = `Return STRICT JSON only (no markdown, no preamble, no code fences) with EXACTLY this shape:
{
  "hook": "string — a short, provoking question, statement, or headline (max ~14 words) to spark thinking BEFORE students see the content",
  "title": "string — the spotlight title",
  ${summaryRule}
  "framing": "string — one short line telling students what to do, e.g. '${MODE_FRAMING[mode]}'",
  "routineName": "string — the EXACT name of the ONE thinking routine you chose from the list below",
  "routineIntro": "string — one warm sentence introducing the routine to the class",
  "steps": [
    { "name": "string — short step label", "minutes": 1, "prompt": "string — what the teacher says/asks at this step" }
  ],
  "guidingQuestions": ["3 to 4 guiding questions pitched to the band"],
  "studentAction": "string — one concrete action or takeaway a student leaves with",
  "learnerProfile": ["1 to 3 IB Learner Profile attributes that fit, e.g. 'Thinker', 'Principled', 'Caring'"]
}
Choose the routine ONLY from this Harvard Project Zero list for this band, and base the timed steps on its actual moves:
${routineList}
Rules: the sum of all step "minutes" MUST be 5 or less (this is a 5-minute discussion). Provide 2–4 steps. Keep language warm, curious, student-centred and IB-aligned.`;

  const systemMsg = "You are an expert IB educator and digital-citizenship coach. You design short, 5-minute 'Digital Space Spotlight' discussion prompts about cyber safety and digital citizenship. Your tone is warm, curious and student-centred, aligned to the IB Learner Profile. You ALWAYS respond with strict JSON only.";

  const textParts = [
    `Create a 5-minute "Digital Space Spotlight" discussion prompt.`,
    BAND_GUIDANCE[band] + yearStr,
    `Focus theme: ${theme}.`,
    titleInstruction,
    `Stimulus mode: ${mode}.`,
  ];

  const userContent = [];

  if (mode === "image") {
    textParts.push("The stimulus is the attached image. Look at its ACTUAL content and build the whole spotlight from what you genuinely see in it. Tie the discussion to the focus theme.");
    userContent.push({ type: "text", text: textParts.join("\n") + "\n\n" + schema });
    userContent.push({ type: "image_url", image_url: { url: imageDataUrl } });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000);
    const noun = mode === "video" ? "video transcript" : "article text";
    textParts.push(`The stimulus is the following ${noun}. Build the spotlight from its real content, tied to the focus theme:\n\n"""\n${trimmed}\n"""`);
    userContent.push({ type: "text", text: textParts.join("\n") + "\n\n" + schema });
  }

  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({
      model,
      messages: [
        { role: "system", content: systemMsg },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 2000,
    }),
  });

  if (!resp.ok) {
    let detail = "";
    try { detail = JSON.stringify((await resp.json()).error || {}, null, 2); }
    catch (_) { detail = await resp.text().catch(() => ""); }
    throw new Error(`OpenAI API error (${resp.status}).\n${detail}`);
  }

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  try {
    return { parsed: parseJsonLoose(raw), raw };
  } catch (perr) {
    const e = new Error("Could not parse the model's JSON: " + perr.message);
    e._raw = raw;
    throw e;
  }
}

/* ------------------------------ App ------------------------------ */

function App() {
  // config
  const [apiKey, setApiKey] = useState("");
  const [model, setModel] = useState("gpt-5.4");

  // inputs
  const [mode, setMode] = useState("image");
  const [imageDataUrl, setImageDataUrl] = useState("");
  const [imageName, setImageName] = useState("");
  const [articleText, setArticleText] = useState("");
  const [articleImageUrl, setArticleImageUrl] = useState("");
  const [pdfName, setPdfName] = useState("");
  const [transcript, setTranscript] = useState("");
  const [title, setTitle] = useState("");
  const [link, setLink] = useState("");
  const [band, setBand] = useState("PYP");
  const [year, setYear] = useState("");
  const [theme, setTheme] = useState(THEMES[0]);
  const [design, setDesign] = useState("editorial");

  // generation
  const [loading, setLoading] = useState(false);
  const [fetchingArticle, setFetchingArticle] = useState(false);
  const [error, setError] = useState("");
  const [rawDump, setRawDump] = useState("");
  const [spot, setSpot] = useState(null); // editable spotlight object

  const imgInput = useRef(null);
  const pdfInput = useRef(null);

  /* ------- file handlers ------- */
  async function onImage(e) {
    const f = e.target.files?.[0]; if (!f) return;
    try { setImageDataUrl(await readFileAsDataURL(f)); setImageName(f.name); }
    catch (_) { setError("Could not read that image."); }
  }
  async function onPdf(e) {
    const f = e.target.files?.[0]; if (!f) return;
    setPdfName(f.name + " (extracting…)");
    try { const t = await extractPdfText(f); setArticleText(t); setPdfName(f.name + ` (${t.length.toLocaleString()} chars)`); }
    catch (err) { setError("Could not extract text from that PDF: " + err.message); setPdfName(""); }
  }
  // Pull readable article text from a public link via the r.jina.ai reader
  // (it allows browser/CORS requests). Hard paywalls may still fail.
  async function fetchArticleFromLink() {
    const url = link.trim();
    setError("");
    if (!/^https?:\/\//i.test(url)) { setError("Enter a full article link starting with http(s):// first."); return; }
    setFetchingArticle(true);
    try {
      const resp = await fetch("https://r.jina.ai/" + url);
      if (!resp.ok) throw new Error("Reader service returned HTTP " + resp.status);
      const rawMd = await resp.text();
      const text = cleanArticleMarkdown(rawMd);
      if (text.length < 40) throw new Error("Got too little text back — the page may be paywalled or JS-only.");
      setArticleText(text);
      setArticleImageUrl(extractLeadImage(rawMd)); // grab the article's lead image (before stripping)
    } catch (err) {
      setError("Couldn't fetch that link (" + (err.message || err) + "). Paste the article text instead.");
    } finally {
      setFetchingArticle(false);
    }
  }

  /* ------- validation ------- */
  function inputReady() {
    if (mode === "image") return !!imageDataUrl;
    if (mode === "article") return articleText.trim().length > 20;
    if (mode === "video") return transcript.trim().length > 20;
    return false;
  }

  /* ------- generate ------- */
  async function generate() {
    setError(""); setRawDump("");
    if (!apiKey.trim()) { setError("Please paste your OpenAI API key first."); return; }
    if (!inputReady()) { setError("Please add the stimulus (image, article text/PDF, or transcript)."); return; }

    setLoading(true);
    try {
      const sourceText = mode === "video" ? transcript : articleText;
      const { parsed, raw } = await generateSpotlight({
        apiKey: apiKey.trim(), model, mode, band, year, theme,
        title: title.trim(), imageDataUrl, sourceText,
      });

      // Build the editable spotlight, merging model output with user-chosen facts.
      const steps = Array.isArray(parsed.steps) && parsed.steps.length
        ? parsed.steps.map(s => ({ name: String(s.name || "Step"), minutes: Number(s.minutes) || 1, prompt: String(s.prompt || "") }))
        : [{ name: "Discuss", minutes: 5, prompt: "" }];

      setSpot({
        hook: String(parsed.hook || ""),
        title: String(parsed.title || title || "Digital Space Spotlight"),
        summary: String(parsed.summary || ""),
        framing: String(parsed.framing || MODE_FRAMING[mode]),
        routineName: String(parsed.routineName || ROUTINES[band][0].name),
        routineIntro: String(parsed.routineIntro || ""),
        steps,
        guidingQuestions: Array.isArray(parsed.guidingQuestions) && parsed.guidingQuestions.length
          ? parsed.guidingQuestions.map(String) : ["", "", ""],
        studentAction: String(parsed.studentAction || ""),
        learnerProfile: Array.isArray(parsed.learnerProfile) ? parsed.learnerProfile.map(String) : [],
      });
      setRawDump(raw);
    } catch (err) {
      setError(err.message || String(err));
      if (err._raw) setRawDump(err._raw);
    } finally {
      setLoading(false);
    }
  }

  /* ------- editing helpers ------- */
  const patch = (obj) => setSpot(s => ({ ...s, ...obj }));
  const patchStep = (i, obj) => setSpot(s => { const steps = s.steps.slice(); steps[i] = { ...steps[i], ...obj }; return { ...s, steps }; });
  const addStep = () => setSpot(s => ({ ...s, steps: [...s.steps, { name: "New step", minutes: 1, prompt: "" }] }));
  const delStep = (i) => setSpot(s => ({ ...s, steps: s.steps.filter((_, j) => j !== i) }));
  const patchQ = (i, v) => setSpot(s => { const q = s.guidingQuestions.slice(); q[i] = v; return { ...s, guidingQuestions: q }; });
  const addQ = () => setSpot(s => ({ ...s, guidingQuestions: [...s.guidingQuestions, ""] }));
  const delQ = (i) => setSpot(s => ({ ...s, guidingQuestions: s.guidingQuestions.filter((_, j) => j !== i) }));

  const totalMins = useMemo(() => spot ? spot.steps.reduce((a, s) => a + (Number(s.minutes) || 0), 0) : 0, [spot]);

  const bandLabel = BANDS[band].label;
  const T = THEME_DESIGNS[design];
  const barStyle = { background: `linear-gradient(90deg, ${hx(T.accent)}, ${hx(T.accent2)})` };
  const kickStyle = { color: hx(T.accent) };

  /* ------- export ------- */
  async function download() {
    if (!spot) return;
    try {
      const T = THEME_DESIGNS[design];
      const accent = T.accent, accent2 = T.accent2, ink = T.ink, muted = T.muted;
      const tFont = T.titleFont, bFont = T.bodyFont;
      const tCase = (s) => T.upper ? String(s).toUpperCase() : String(s);
      const W = 13.33, H = 7.5;

      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: "WIDE", width: W, height: H });
      pptx.layout = "WIDE";

      const newSlide = (n, kind) => {
        const s = pptx.addSlide();
        s.background = { color: kind === "title" ? T.titleBg : T.contentBg };
        s.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: W, h: 0.18, fill: { color: accent } });
        s.addText(`Digital Space Spotlight · 5-minute discussion · ${n}/6`, { x: 0.6, y: H - 0.42, w: W - 1.2, h: 0.3, fontSize: 9, color: muted, fontFace: bFont });
        return s;
      };
      const kicker = (s, txt, col) => s.addText(String(txt).toUpperCase(), { x: 0.8, y: 0.55, w: W - 1.6, h: 0.4, fontSize: 13, bold: true, color: col || accent, charSpacing: 2, fontFace: bFont });

      // Resolve the stimulus image to an embeddable data URL.
      let stimImg = "";
      if (mode === "image" && imageDataUrl) stimImg = imageDataUrl;
      else if (mode === "article" && articleImageUrl) stimImg = await urlToDataUrl(articleImageUrl);

      /* Slide 1 — HOOK */
      const s1 = newSlide(1, "title");
      kicker(s1, "Hook", accent2);
      s1.addText(tCase(spot.hook || spot.title), { x: 0.9, y: 1.6, w: W - 1.8, h: 3.8, fontSize: 44, bold: true, color: ink, valign: "middle", fontFace: tFont });
      s1.addText(`${bandLabel}${year ? " · " + year : ""}   ·   ${theme}`, { x: 0.9, y: 5.7, w: W - 1.8, h: 0.4, fontSize: 14, color: muted, fontFace: bFont });

      /* Slide 2 — TITLE */
      const s2 = newSlide(2, "title");
      s2.addText("DIGITAL SPACE SPOTLIGHT", { x: 0.8, y: 1.1, w: W - 1.6, h: 0.5, fontSize: 15, bold: true, color: accent, charSpacing: 2, fontFace: bFont });
      s2.addText(tCase(spot.title), { x: 0.8, y: 1.8, w: W - 1.6, h: 2.0, fontSize: 40, bold: true, color: ink, valign: "top", fontFace: tFont });
      s2.addText([
        { text: bandLabel + (year ? " · " + year : "") + "      ", options: { color: accent, bold: true } },
        { text: theme, options: { color: accent2, bold: true } },
      ], { x: 0.8, y: 3.95, w: W - 1.6, h: 0.5, fontSize: 18, fontFace: bFont });
      s2.addText("5-minute discussion", { x: 0.8, y: 4.65, w: W - 1.6, h: 0.5, fontSize: 16, italic: true, color: muted, fontFace: bFont });

      /* Slide 3 — STIMULUS */
      const s3 = newSlide(3, "content");
      kicker(s3, "Stimulus");
      s3.addText(spot.framing, { x: 0.8, y: 1.0, w: W - 1.6, h: 0.6, fontSize: 22, bold: true, color: ink, fontFace: tFont });
      const hasSummary = !!(spot.summary && spot.summary.trim());
      if (mode === "image" && stimImg) {
        s3.addImage({ data: stimImg, x: 1.2, y: 1.9, w: 10.9, h: 4.7, sizing: { type: "contain", w: 10.9, h: 4.7 } });
      } else {
        const rightMedia = !!(stimImg || link.trim());
        const sumW = rightMedia ? 6.9 : W - 1.6;
        if (hasSummary) s3.addText(spot.summary, { x: 0.8, y: 1.9, w: sumW, h: 4.6, fontSize: 15, color: ink, valign: "top", fontFace: bFont, lineSpacingMultiple: 1.15 });
        else if (!rightMedia) s3.addText("(Share the stimulus with students directly.)", { x: 0.8, y: 2.0, w: W - 1.6, h: 0.6, fontSize: 15, italic: true, color: muted, fontFace: bFont });
        const rx = 8.0, rw = 4.5;
        let ry = 1.9;
        if (stimImg) { s3.addImage({ data: stimImg, x: rx, y: ry, w: rw, h: 3.2, sizing: { type: "contain", w: rw, h: 3.2 } }); ry += 3.4; }
        if (link.trim()) {
          const url = link.trim();
          const qr = makeQrDataUrl(url);
          if (qr) s3.addImage({ data: qr, x: rx, y: ry, w: 1.5, h: 1.5 });
          s3.addText([{ text: `${MODE_VERB[mode]}: `, options: { color: ink, bold: true } }, { text: url, options: { color: accent, underline: true, hyperlink: { url } } }],
            { x: rx + (qr ? 1.7 : 0), y: ry, w: rw - (qr ? 1.7 : 0), h: 1.5, fontSize: 11, valign: "middle", fontFace: bFont });
        }
      }

      /* Slide 4 — DISCUSSION SCAFFOLD */
      const s4 = newSlide(4, "content");
      kicker(s4, "Discussion scaffold");
      s4.addText(tCase(spot.routineName), { x: 0.8, y: 1.0, w: W - 1.6, h: 0.6, fontSize: 26, bold: true, color: ink, fontFace: tFont });
      if (spot.routineIntro) s4.addText(spot.routineIntro, { x: 0.8, y: 1.65, w: W - 1.6, h: 0.5, fontSize: 15, italic: true, color: muted, fontFace: bFont });
      let yy = 2.45;
      spot.steps.forEach((st) => {
        s4.addText([
          { text: `${st.minutes} min    `, options: { bold: true, color: accent2 } },
          { text: st.name, options: { bold: true, color: ink } },
          { text: st.prompt ? `\n${st.prompt}` : "", options: { color: ink } },
        ], { x: 0.9, y: yy, w: W - 1.8, h: 1.0, fontSize: 15, valign: "top", fontFace: bFont });
        yy += 1.0;
      });
      s4.addText(ROUTINE_SOURCE, { x: 0.8, y: H - 0.75, w: W - 1.6, h: 0.3, fontSize: 9, italic: true, color: muted, fontFace: bFont });

      /* Slide 5 — TEACHER NOTES (guiding questions) */
      const s5 = newSlide(5, "content");
      kicker(s5, "Teacher notes · guiding questions");
      const qBullets = spot.guidingQuestions.filter(q => q.trim()).map(q => ({ text: q, options: { bullet: { code: "2022" }, color: ink, paraSpaceAfter: 12 } }));
      s5.addText(qBullets.length ? qBullets : [{ text: "—", options: { color: muted } }], { x: 0.9, y: 1.5, w: W - 1.8, h: 4.8, fontSize: 18, valign: "top", fontFace: bFont });

      /* Slide 6 — STUDENT KEY TAKEAWAY */
      const s6 = newSlide(6, "title");
      kicker(s6, "Your key takeaway", accent2);
      s6.addShape(pptx.ShapeType.roundRect, { x: 1.1, y: 2.2, w: W - 2.2, h: 2.8, fill: { color: accent2 }, rectRadius: 0.18 });
      s6.addText(spot.studentAction || "—", { x: 1.7, y: 2.4, w: W - 3.4, h: 2.4, fontSize: 26, bold: true, color: "FFFFFF", valign: "middle", align: "center", fontFace: tFont });
      if (spot.learnerProfile.filter(Boolean).length)
        s6.addText("IB Learner Profile: " + spot.learnerProfile.filter(Boolean).join(", "), { x: 1.1, y: 5.4, w: W - 2.2, h: 0.4, fontSize: 14, italic: true, color: accent, align: "center", fontFace: bFont });

      const safe = (spot.title || "spotlight").replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-").slice(0, 50) || "spotlight";
      await pptx.writeFile({ fileName: `Digital-Space-Spotlight_${safe}.pptx` });
    } catch (err) {
      setError("PowerPoint export failed: " + (err.message || String(err)));
    }
  }

  /* ------------------------------ render ------------------------------ */
  return (
    <React.Fragment>
      <header className="app">
        <div className="logo">✦</div>
        <div>
          <h1>Digital Space Spotlight</h1>
          <p>5-minute cyber-safety &amp; digital-citizenship discussion prompts → PowerPoint</p>
        </div>
      </header>

      <div className="layout">
        {/* ----------------- INPUT PANEL ----------------- */}
        <div className="panel input">
          <div className="group">
            <label className="cap">OpenAI API key</label>
            <input type="password" value={apiKey} placeholder="sk-…" onChange={e => setApiKey(e.target.value)} />
            <div className="hint">Kept in memory only — never saved or stored.</div>
          </div>

          <div className="group">
            <label className="cap">Model</label>
            <select value={model} onChange={e => setModel(e.target.value)}>
              <option value="gpt-5.4">gpt-5.4</option>
              <option value="gpt-5.5">gpt-5.5</option>
              <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            </select>
          </div>

          <div className="group">
            <label className="cap">Stimulus mode</label>
            <div className="modes">
              {["image", "article", "video"].map(m => (
                <button key={m} className={mode === m ? "active" : ""} onClick={() => setMode(m)}>
                  {m === "image" ? "🖼 Image" : m === "article" ? "📄 Article" : "🎬 Video"}
                </button>
              ))}
            </div>
          </div>

          {mode === "image" && (
            <div className="group">
              <label className="cap">Upload image</label>
              <div className="filebox" onClick={() => imgInput.current.click()}>
                {imageDataUrl
                  ? <React.Fragment><img className="thumb" src={imageDataUrl} alt="" /><div className="small">{imageName} — click to replace</div></React.Fragment>
                  : <React.Fragment><div className="big">🖼</div><div className="small">Click to upload an image</div></React.Fragment>}
              </div>
              <input ref={imgInput} type="file" accept="image/*" hidden onChange={onImage} />
              <div className="hint">The model sees the actual image and builds the Spotlight from its real content.</div>
            </div>
          )}

          {mode === "article" && (
            <div className="group">
              <label className="cap">Article — upload PDF or paste text</label>
              <div className="filebox" onClick={() => pdfInput.current.click()}>
                <div className="big">📄</div>
                <div className="small">{pdfName || "Click to upload a PDF"}</div>
              </div>
              <input ref={pdfInput} type="file" accept="application/pdf" hidden onChange={onPdf} />

              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <input type="text" value={link} placeholder="…or paste an article link (https://…)" onChange={e => setLink(e.target.value)} />
                <button className="btn ghost" style={{ width: "auto", padding: "9px 12px", whiteSpace: "nowrap" }} disabled={fetchingArticle} onClick={fetchArticleFromLink}>
                  {fetchingArticle ? "Fetching…" : "Fetch text"}
                </button>
              </div>

              <textarea style={{ marginTop: 8 }} value={articleText} placeholder="…the fetched or pasted article text appears here (edit freely)" onChange={e => setArticleText(e.target.value)} />
              <div className="hint"><b>Fetch text</b> pulls the article via a public reader service — works for open news sites (the link also becomes the QR code). Hard paywalls may fail; upload the PDF or paste the text instead.</div>
            </div>
          )}

          {mode === "video" && (
            <div className="group">
              <label className="cap">Video transcript <span style={{ color: "var(--bad)" }}>(required)</span></label>
              <textarea value={transcript} placeholder="Paste the video transcript here" onChange={e => setTranscript(e.target.value)} />
              <div className="hint">The tool <b>can't watch the video</b> — paste the transcript so the model can read it.</div>
            </div>
          )}

          {mode === "video" && (
            <div className="group">
              <label className="cap">Video link (optional — becomes a QR code)</label>
              <input type="text" value={link} placeholder="https://…" onChange={e => setLink(e.target.value)} />
            </div>
          )}

          <div className="group">
            <label className="cap">Title (optional)</label>
            <input type="text" value={title} placeholder="Leave blank to auto-generate" onChange={e => setTitle(e.target.value)} />
          </div>

          <div className="group">
            <label className="cap">Band &amp; year</label>
            <div className="row2">
              <select value={band} onChange={e => { setBand(e.target.value); setYear(""); }}>
                {Object.keys(BANDS).map(b => <option key={b} value={b}>{BANDS[b].label}</option>)}
              </select>
              <select value={year} onChange={e => setYear(e.target.value)}>
                <option value="">Whole band</option>
                {BANDS[band].years.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </div>

          <div className="group">
            <label className="cap">Focus theme</label>
            <select value={theme} onChange={e => setTheme(e.target.value)}>
              {THEMES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>

          <button className="btn primary" disabled={loading} onClick={generate}>
            {loading ? <React.Fragment><span className="spinner"></span> Generating…</React.Fragment> : (spot ? "↻ Regenerate" : "✦ Generate Spotlight")}
          </button>

          {error && <div className="alert bad"><b>Something went wrong.</b><pre>{error}</pre>{rawDump && <React.Fragment><b>Raw model output:</b><pre>{rawDump}</pre></React.Fragment>}</div>}
        </div>

        {/* ----------------- PREVIEW PANEL ----------------- */}
        <div>
          {!spot && !loading && (
            <div className="panel"><div className="empty">
              <div className="big">✦</div>
              <h2 style={{ margin: "0 0 6px" }}>Your Spotlight preview appears here</h2>
              <p>Add a stimulus on the left and hit <b>Generate</b>. Every field below will be editable before you download.</p>
            </div></div>
          )}

          {spot && (
            <React.Fragment>
              <div className="toolbar">
                <button className="btn ghost" disabled={loading} onClick={generate}>↻ Regenerate</button>
                <button className="btn primary" onClick={download}>⬇ Download PowerPoint</button>
              </div>

              {/* PowerPoint design picker + live themed thumbnail */}
              <div className="design-row">
                <div className="thumb-slide" style={{ background: hx(T.titleBg), color: hx(T.ink), fontFamily: T.bodyFont }}>
                  <div className="thumb-bar" style={barStyle}></div>
                  <div className="thumb-kick" style={{ color: hx(T.accent2) }}>HOOK</div>
                  <div className="thumb-title" style={{ fontFamily: T.titleFont, textTransform: T.upper ? "uppercase" : "none" }}>{spot.hook || spot.title}</div>
                  <div className="thumb-meta" style={{ color: hx(T.muted) }}>{bandLabel} · {theme}</div>
                </div>
                <div style={{ flex: 1 }}>
                  <label className="cap" style={{ display: "block", marginBottom: 6 }}>PowerPoint design</label>
                  <select value={design} onChange={e => setDesign(e.target.value)}>
                    {Object.keys(THEME_DESIGNS).map(k => <option key={k} value={k}>{THEME_DESIGNS[k].label}</option>)}
                  </select>
                  <div className="hint">Switch anytime — the thumbnail shows the export look. Edit content in the cards below; styling applies on download.</div>
                </div>
              </div>

              <div className="slides">
                {/* Slide 1 — Hook */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 1 · Hook <span style={{ color: "var(--muted)", fontWeight: 600 }}>· provokes thinking first</span></div>
                  <textarea className="editable titlebig" rows={2} value={spot.hook} placeholder="A provoking question, statement, or headline…" onChange={e => patch({ hook: e.target.value })} />
                </div></div>

                {/* Slide 2 — Title */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 2 · Title</div>
                  <textarea className="editable titlebig" rows={1} value={spot.title} onChange={e => patch({ title: e.target.value })} />
                  <div className="meta-chips">
                    <span className="chip">{bandLabel}{year ? " · " + year : ""}</span>
                    <span className="chip coral">{theme}</span>
                  </div>
                  <div style={{ color: "var(--muted)", fontStyle: "italic" }}>5-minute discussion</div>
                </div></div>

                {/* Slide 3 — Stimulus */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 3 · Stimulus</div>
                  <textarea className="editable" rows={1} value={spot.framing} onChange={e => patch({ framing: e.target.value })} />
                  {mode !== "image" && (
                    <React.Fragment>
                      <div className="cap" style={{ marginTop: 6 }}>5-sentence summary</div>
                      <textarea className="editable" rows={5} value={spot.summary} placeholder="A 5-sentence summary for students…" onChange={e => patch({ summary: e.target.value })} />
                    </React.Fragment>
                  )}
                  {mode === "image" && imageDataUrl && <div className="stim-img"><img src={imageDataUrl} alt="" /></div>}
                  {mode === "article" && articleImageUrl && (
                    <div className="stim-img" style={{ position: "relative" }}>
                      <img src={articleImageUrl} alt="article" />
                      <button className="iconbtn" style={{ position: "absolute", top: 6, right: 6 }} title="Remove image" onClick={() => setArticleImageUrl("")}>✕</button>
                    </div>
                  )}
                  {mode !== "image" && link.trim() && <StimLink url={link.trim()} verb={MODE_VERB[mode]} />}
                  {mode !== "image" && !link.trim() && !articleImageUrl && <div className="hint">Tip: add a link on the left for a clickable link + QR code, or fetch an article to pull in its lead image.</div>}
                </div></div>

                {/* Slide 4 — Scaffold */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 4 · Discussion scaffold <span style={{ color: "var(--muted)", fontWeight: 600 }}>· {ROUTINE_SOURCE}</span></div>
                  <textarea className="editable" rows={1} style={{ fontWeight: 700, fontSize: 16 }} value={spot.routineName} onChange={e => patch({ routineName: e.target.value })} />
                  <textarea className="editable" rows={1} style={{ fontStyle: "italic", color: "var(--muted)" }} value={spot.routineIntro} onChange={e => patch({ routineIntro: e.target.value })} />
                  {spot.steps.map((st, i) => (
                    <div className="step" key={i}>
                      <div className="mins"><input type="number" min="0" max="5" value={st.minutes} onChange={e => patchStep(i, { minutes: Number(e.target.value) })} /><span>min</span></div>
                      <div>
                        <input className="editable name" value={st.name} onChange={e => patchStep(i, { name: e.target.value })} />
                        <textarea className="editable" rows={2} value={st.prompt} onChange={e => patchStep(i, { prompt: e.target.value })} />
                      </div>
                      <button className="iconbtn" title="Remove step" onClick={() => delStep(i)}>✕</button>
                    </div>
                  ))}
                  <button className="addbtn" onClick={addStep}>+ Add step</button>
                  <div className={"total" + (totalMins > 5 ? " over" : "")}>Total: {totalMins} min {totalMins > 5 ? "— over 5 minutes!" : "/ 5 min"}</div>
                </div></div>

                {/* Slide 5 — Teacher notes (guiding questions) */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 5 · Teacher notes</div>
                  <h3>Guiding questions</h3>
                  <ul className="ql">
                    {spot.guidingQuestions.map((q, i) => (
                      <li key={i}>
                        <span className="num" style={{ background: hx(T.accent) }}>{i + 1}</span>
                        <textarea className="editable" rows={1} value={q} onChange={e => patchQ(i, e.target.value)} />
                        <button className="iconbtn" title="Remove" onClick={() => delQ(i)}>✕</button>
                      </li>
                    ))}
                  </ul>
                  <button className="addbtn" onClick={addQ}>+ Add question</button>
                </div></div>

                {/* Slide 6 — Student key takeaway */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="kicker" style={kickStyle}>Slide 6 · Student key takeaway</div>
                  <div className="action-box" style={{ background: hx(T.accent2) + "1A", borderColor: hx(T.accent2) + "55" }}>
                    <div className="cap" style={{ color: hx(T.accent2) }}>One thing to take away</div>
                    <textarea className="editable" rows={2} value={spot.studentAction} onChange={e => patch({ studentAction: e.target.value })} />
                  </div>
                  <div className="lp-chips">
                    {spot.learnerProfile.filter(Boolean).map((lp, i) => <span key={i} className="chip">LP · {lp}</span>)}
                  </div>
                </div></div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

/* QR preview component (synchronous, crash-proof) */
function StimLink({ url, verb }) {
  const qr = makeQrDataUrl(url);
  return (
    <div className="stim-link">
      {qr && <img className="qr" src={qr} alt="QR code" />}
      <div><div style={{ marginBottom: 4 }}>{verb} here:</div><a href={url} target="_blank" rel="noreferrer">{url}</a></div>
    </div>
  );
}

/* Error boundary so a render error shows a message instead of a blank screen */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("App crashed:", err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ maxWidth: 720, margin: "60px auto", padding: 24, fontFamily: "Segoe UI, sans-serif" }}>
          <h2 style={{ color: "#d64545" }}>Something crashed in the app</h2>
          <p>Try a hard refresh (Ctrl+F5). If it keeps happening, send this message:</p>
          <pre style={{ whiteSpace: "pre-wrap", background: "#fdecec", border: "1px solid #f3c9c9", borderRadius: 10, padding: 12 }}>
            {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
